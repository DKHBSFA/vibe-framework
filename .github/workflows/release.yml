name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches tag
        run: |
          file_version=$(tr -d '[:space:]' < VERSION)
          if [ "$file_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: VERSION file ($file_version) doesn't match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Extract changelog for this version
        run: |
          awk '/^## \['"${{ steps.version.outputs.version }}"'\]/{found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
